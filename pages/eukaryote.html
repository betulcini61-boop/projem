<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Okaryot Turu</title>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body data-page="tour" data-tour="eukaryote">
    <header class="topbar">
      <a class="brand" href="../index.html" aria-label="Hucre Turu">
        <span class="brand-mark"></span>
        <span data-i18n="brand">Hucre Turu</span>
      </a>
      <nav class="language-switch" aria-label="Language">
        <button class="lang-button is-active" type="button" data-lang="tr">TR</button>
        <button class="lang-button" type="button" data-lang="en">EN</button>
      </nav>
    </header>

    <main class="tour-shell">
      <section class="tour-stage" aria-labelledby="tour-title">
        <div class="tour-board eu-board">
          <div class="diagram eu-diagram" aria-hidden="true">
            <button class="hotspot h-nucleus" type="button" data-step="0"></button>
            <button class="hotspot h-mito" type="button" data-step="1"></button>
            <button class="hotspot h-er" type="button" data-step="2"></button>
            <button class="hotspot h-golgi" type="button" data-step="3"></button>
            <button class="hotspot h-membrane" type="button" data-step="4"></button>
            <span class="cell-ring"></span>
            <span class="nucleus"></span>
            <span class="mito"></span>
            <span class="er"></span>
            <span class="golgi"></span>
            <span class="vesicle v1"></span>
            <span class="vesicle v2"></span>
            <span class="vesicle v3"></span>
          </div>
        </div>

        <aside class="tour-panel">
          <a class="back-link" href="../index.html" data-i18n="tour.back">Ana sayfa</a>
          <p class="eyebrow" data-tour-field="kind"></p>
          <h1 id="tour-title" data-tour-field="title"></h1>
          <p class="lead" data-tour-field="intro"></p>

          <div class="step-card" aria-live="polite">
            <div class="step-meta">
              <span id="step-count"></span>
              <span data-tour-field="activeLabel"></span>
            </div>
            <h2 id="step-title"></h2>
            <p id="step-body"></p>
          </div>

          <div class="step-controls">
            <button class="icon-button" type="button" id="prev-step" aria-label="Previous">&lsaquo;</button>
            <div class="dots" id="step-dots" aria-label="Tour steps"></div>
            <button class="icon-button" type="button" id="next-step" aria-label="Next">&rsaquo;</button>
          </div>
        </aside>
      </section>
    </main>

    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/tours.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
